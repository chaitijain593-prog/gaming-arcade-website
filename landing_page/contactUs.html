<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Arcade Zone</title>
    <style>
        body {
            background-color: #1a1a1a; /* Dark charcoal background */
            color: #ffffff; /* White text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #39ff14; /* Lime neon green */
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        hr {
            border: 0;
            border-top: 1px solid #2e7d32; /* Darker green line */
            margin-bottom: 30px;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        ul {
            list-style-type: disc;
            padding-left: 20px;
        }

        li {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        strong {
            color: #ffffff;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #39ff14;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Us</h1>
        <hr>

        <p class="subtitle">Have questions or feedback? Reach out to the Arcade Zone team:</p>

        <ul>
            <li><strong>Email:</strong> support@arcadezone.com</li>
            <li><strong>Phone:</strong> +1 (555) 123-4567</li>
        </ul>

        <a href="index.html" class="back-link">← Back to Arcade</a>
    </div>

</body>
</html>
