<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
    <header class="header">
        <div class="player player-active" id="xplayerdisplay" onclick="chooseplayer('X')">X</div>
        <h3 id="titleheader">Choose</h3>
        <div class="player" id="oplayerdisplay" onclick="chooseplayer('O')">O</div>
    </header>
    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <button class="restart">Restart Game</button>
    <label>
  <input type="checkbox" id="computer"> Play against Computer
</label>
    </main>
    <script src="script.js"></script>
</body>
</html>
